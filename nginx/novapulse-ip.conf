# NovaPulse — Nginx config for direct IP access (no TLS)
# Use this when you don't have a domain yet (testing / staging).
# Let's Encrypt does NOT issue certs for bare IPs, so this is HTTP only.
#
# Deploy:
#   sudo cp nginx/novapulse-ip.conf /etc/nginx/sites-available/novapulse
#   sudo ln -sf /etc/nginx/sites-available/novapulse /etc/nginx/sites-enabled/novapulse
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# When you get a domain later, switch to nginx/novapulse.conf and run Certbot.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # Accepts both the raw IP and any hostname that resolves to this server.
    # No server_name restriction needed for IP-only access.
    server_name _;

    # Built React frontend (run: cd /opt/novapulse/frontend && npm run build)
    root /opt/novapulse/frontend/dist;
    index index.html;

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API → backend container (host port 3100)
    location /api/ {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
