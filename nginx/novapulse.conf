# NovaPulse — Nginx server block
# Deploy to: /etc/nginx/sites-available/novapulse
# Enable with: sudo ln -s /etc/nginx/sites-available/novapulse /etc/nginx/sites-enabled/novapulse
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# Replace trade.yourdomain.com with your actual subdomain everywhere below.

server {
    listen 80;
    server_name trade.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trade.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/trade.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trade.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Built React frontend (run: cd frontend && npm run build)
    root /opt/novapulse/frontend/dist;
    index index.html;

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to the backend container (host port 3100)
    location /api/ {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
